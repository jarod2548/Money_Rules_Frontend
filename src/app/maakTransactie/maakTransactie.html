<div class="form-container">
  <form >
    
    <div class="form-group">
      <label for="number">Voer een getal in:</label>
     <input (input)="updateAantal($event)"
      [value]="transactieData().aantal"
      type="number" id="number">
    </div>

    <div class="form-group">
      <label for="date">Select a date:</label>
      <input (input)="updateDatum($event)"
      [value]="transactieData().datum"
      type="datetime-local" id="date" name="date">
    </div>

    <div class="form-group">
      <label for="text">Enter text:</label>
      <input (input)="updateBeschrijving($event)"
      [value]="transactieData().beschrijving"
      type="text" id="text" name="text">
    </div>

    <button [disabled]="!formIsValid()" (click)="onSubmit()" >Submit</button>

  </form>
</div>
