<h2>Transacties</h2>

<!-- Error state -->
@if (errorMessage()) {
  <p style="color: red;">{{ errorMessage() }}</p>
}

<!-- Data list -->
@for (transactie of transacties(); track $index) {
  <div class="transactie-item">
    <p><strong>ID:</strong> {{ transactie.id }}</p>
    <p><strong>Bedrag:</strong> {{ transactie.aantal }}</p>
    <p><strong>Datum:</strong> {{ transactie.datum }}</p>
  </div>
}
